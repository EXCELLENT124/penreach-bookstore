{% extends "admin/base.html" %}
{% load static %}

{% block extrastyle %}{{ block.super }}
<style>
    /* Custom Admin Theme - Purple & Orange */
    :root {
        --primary-color: #7c3aed;
        --secondary-color: #f59e0b;
        --accent-color: #1e3a8a;
    }
    
    #header {
        background: linear-gradient(135deg, #7c3aed 0%, #1e3a8a 100%);
        color: white;
    }
    
    #header a:link, #header a:visited {
        color: white;
    }
    
    .module h2, .module caption, .inline-group h2 {
        background: #7c3aed;
        color: white;
    }
    
    .button, input[type=submit], input[type=button], .submit-row input, a.button {
        background: #7c3aed;
        color: white;
        border-radius: 4px;
        transition: all 0.3s ease;
    }
    
    .button:hover, input[type=submit]:hover, input[type=button]:hover {
        background: #6b21a8;
        transform: translateY(-1px);
    }
    
    .button.default, input[type=submit].default, .submit-row input.default {
        background: #f59e0b;
        color: #1e3a8a;
        font-weight: bold;
    }
    
    /* Stats Cards */
    .admin-stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        margin: 20px 0;
    }
    
    .stat-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        transition: all 0.3s ease;
        border-left: 4px solid #7c3aed;
    }
    
    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    }
    
    .stat-value {
        font-size: 32px;
        font-weight: bold;
        color: #1f2937;
        margin: 10px 0;
    }
    
    .stat-label {
        color: #6b7280;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    
    /* Preview Modal */
    .preview-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }
    
    .preview-modal.active {
        display: flex;
    }
    
    .preview-content {
        background: white;
        border-radius: 16px;
        max-width: 600px;
        width: 90%;
        padding: 24px;
        position: relative;
        animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
        from { transform: translateY(-50px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
    
    /* Progress Bar */
    .progress-bar {
        width: 100%;
        height: 8px;
        background: #e5e7eb;
        border-radius: 4px;
        overflow: hidden;
    }
    
    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #7c3aed 0%, #f59e0b 100%);
        transition: width 0.3s ease;
    }
    
    /* Drop Zone */
    .drop-zone {
        border: 3px dashed #7c3aed;
        border-radius: 12px;
        padding: 40px;
        text-align: center;
        transition: all 0.3s ease;
        background: #faf5ff;
    }
    
    .drop-zone.dragover {
        background: #f3e8ff;
        border-color: #f59e0b;
    }
</style>
{% endblock %}

{% block extrahead %}
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
// Admin Enhancement JavaScript
document.addEventListener('DOMContentLoaded', function() {
    // Initialize all admin enhancements
    initBookPreview();
    initOrderStatusUpdate();
    initBulkUpload();
    initCharts();
});

// 1. Book Preview Modal
function initBookPreview() {
    // Add preview buttons to book list
    const bookRows = document.querySelectorAll('#result_list tbody tr');
    bookRows.forEach(row => {
        const previewBtn = document.createElement('button');
        previewBtn.className = 'preview-btn';
        previewBtn.innerHTML = '👁️ Preview';
        previewBtn.style.cssText = 'background:#7c3aed;color:white;border:none;padding:4px 12px;border-radius:4px;cursor:pointer;margin-left:8px;';
        previewBtn.onclick = function() {
            const bookId = row.querySelector('th a')?.href?.split('/').pop();
            if (bookId) showBookPreview(bookId);
        };
        const actionCell = row.querySelector('td:last-child');
        if (actionCell) actionCell.appendChild(previewBtn);
    });
}

function showBookPreview(bookId) {
    // Create modal if not exists
    let modal = document.getElementById('book-preview-modal');
    if (!modal) {
        modal = document.createElement('div');
        modal.id = 'book-preview-modal';
        modal.className = 'preview-modal';
        modal.innerHTML = `
            <div class="preview-content">
                <span class="preview-close" onclick="closePreview()">&times;</span>
                <div id="preview-body">Loading...</div>
            </div>
        `;
        document.body.appendChild(modal);
    }
    
    // Show modal
    modal.classList.add('active');
    
    // Fetch book data
    fetch(`/admin/books/book/${bookId}/preview/`)
        .then(r => r.json())
        .then(data => {
            document.getElementById('preview-body').innerHTML = `
                <h2>${data.title}</h2>
                <img src="${data.cover_image}" style="max-width:200px;" />
                <p><strong>Price:</strong> R${data.price}</p>
                <p><strong>Stock:</strong> ${data.stock}</p>
                <p>${data.description}</p>
            `;
        });
}

function closePreview() {
    document.getElementById('book-preview-modal').classList.remove('active');
}

// 2. AJAX Order Status Update
function initOrderStatusUpdate() {
    const statusSelects = document.querySelectorAll('.order-status-select');
    statusSelects.forEach(select => {
        select.addEventListener('change', function() {
            const orderId = this.dataset.orderId;
            const newStatus = this.value;
            
            fetch(`/admin/orders/order/${orderId}/update-status/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ status: newStatus })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    showNotification('Status updated!', 'success');
                }
            });
        });
    });
}

// 3. Enhanced Bulk Upload with Progress
function initBulkUpload() {
    const dropZone = document.getElementById('bulk-upload-zone');
    if (!dropZone) return;
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('dragover');
    });
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        handleFileUpload(e.dataTransfer.files[0]);
    });
}

function handleFileUpload(file) {
    // Validate file
    if (!file.name.endsWith('.csv') && !file.name.endsWith('.xlsx')) {
        showNotification('Please upload CSV or Excel file', 'error');
        return;
    }
    
    const formData = new FormData();
    formData.append('file', file);
    
    // Show progress
    const progressDiv = document.getElementById('upload-progress');
    progressDiv.style.display = 'block';
    
    fetch('/admin/books/bulk-upload/', {
        method: 'POST',
        body: formData,
        headers: { 'X-CSRFToken': getCookie('csrftoken') }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            showNotification(`Uploaded ${data.count} books!`, 'success');
        }
        progressDiv.style.display = 'none';
    });
}

// 4. Charts Initialization
function initCharts() {
    const ctx = document.getElementById('sales-chart');
    if (!ctx) return;
    
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'Sales',
                data: [12, 19, 3, 5, 2, 3],
                borderColor: '#7c3aed',
                backgroundColor: 'rgba(124, 58, 237, 0.1)',
                tension: 0.4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                }
            }
        }
    });
}

// Helper Functions
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}

function showNotification(message, type = 'info') {
    const notif = document.createElement('div');
    notif.className = `notification ${type}`;
    notif.textContent = message;
    notif.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 12px 24px;
        border-radius: 8px;
        color: white;
        font-weight: bold;
        z-index: 9999;
        animation: slideIn 0.3s ease;
        background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#7c3aed'};
    `;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 3000);
}
</script>
{% endblock %}

{% block nav-global %}
<!-- Quick Stats in Header -->
<div class="admin-stats-grid" style="padding: 10px 20px; background: rgba(255,255,255,0.1);">
    <div style="display: flex; gap: 30px; color: white;">
        <span>📚 <strong>{{ book_count|default:0 }}</strong> Books</span>
        <span>📦 <strong>{{ order_count|default:0 }}</strong> Orders</span>
        <span>👥 <strong>{{ customer_count|default:0 }}</strong> Customers</span>
    </div>
</div>
{% endblock %}
