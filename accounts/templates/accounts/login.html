{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bookstore</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full">
            <!-- Login Square Container -->
            <div class="bg-white rounded-lg shadow-lg p-8 border-4" style="border-color: #1e3a8a; background-color: #87CEEB;">
                <!-- Logo -->
                <div class="text-center mb-6">
                    <img src="{% static 'images/penreach-logo.jpg' %}" alt="Penreach Logo" class="w-20 h-20 mx-auto mb-4">
                </div>
                
                <!-- Title -->
                <h2 class="text-2xl font-bold text-gray-900 text-center mb-6">
                    Sign in to Penreach Bookshop
                </h2>
                
                <!-- Login Form -->
                <form class="space-y-6" method="post">
                    {% csrf_token %}
                    {% if form.errors %}
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4">
                            {{ form.non_field_errors }}
                        </div>
                    {% endif %}
                    
                    <!-- Username Field -->
                    <div>
                        <label for="id_username" class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                        <input id="id_username" name="username" type="text" required 
                               class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                               placeholder="Enter your username">
                    </div>
                    
                    <!-- Password Field -->
                    <div>
                        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                        <input id="id_password" name="password" type="password" required 
                               class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" 
                               placeholder="Enter your password">
                    </div>

                    <!-- Sign In Button -->
                    <div class="pt-4">
                        <button type="submit" 
                                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Sign in
                        </button>
                    </div>
                    
                    <!-- Sign Up Link -->
                    <div class="mt-6 text-center">
                        <p class="text-sm text-gray-600">
                            Don't have an account? 
                            <a href="{% url 'signup' %}" class="font-medium text-indigo-600 hover:text-indigo-500">
                                Sign up
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
